<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" role="img" aria-label="Union type narrowing diagram">
  <defs>
    <style>
      .box { fill: #0f172a; stroke: #334155; stroke-width: 2; }
      .box2 { fill: #111827; stroke: #475569; stroke-width: 2; }
      .txt { fill: #e2e8f0; font-family: Segoe UI, Arial, sans-serif; }
      .muted { fill: #94a3b8; font-family: Segoe UI, Arial, sans-serif; }
      .accent { fill: #60a5fa; font-family: Segoe UI, Arial, sans-serif; font-weight: 700; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="420" fill="#0b1020"/>

  <rect class="box" x="70" y="90" width="320" height="120" rx="14"/>
  <text class="txt" x="90" y="130" font-size="22">ApiResult</text>
  <text class="muted" x="90" y="165" font-size="18">= Success | Failure</text>
  <text class="accent" x="90" y="195" font-size="18">Union type</text>

  <rect class="box2" x="440" y="70" width="500" height="160" rx="14"/>
  <text class="txt" x="470" y="115" font-size="20">if (result.ok)</text>
  <text class="muted" x="470" y="145" font-size="18">TS “narrow” về nhánh Success</text>
  <text class="txt" x="470" y="185" font-size="18">result.data: string[]</text>

  <rect class="box2" x="440" y="260" width="500" height="120" rx="14"/>
  <text class="txt" x="470" y="305" font-size="20">else</text>
  <text class="muted" x="470" y="335" font-size="18">TS “narrow” về nhánh Failure</text>
  <text class="txt" x="470" y="365" font-size="18">result.error: string</text>

  <line x1="390" y1="150" x2="440" y2="145" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="390" y1="150" x2="440" y2="305" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
</svg>

